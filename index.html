<!DOCTYPE html>
<html>
<head>
<title>RK Photo Frame</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2>RK Photo Frame</h2>
<p>Premium Custom Framing</p>
</header>

<section class="container">

<!-- PREVIEW -->
<div class="preview">
<div class="wall">

<div id="frameBox" class="frame-box">

<div id="mountBox" class="mount-box">

<img id="userImage" class="photo">

</div>

</div>

</div>
</div>

<!-- CONTROLS -->
<div class="controls">

<h3>Upload Photo</h3>
<input type="file" id="upload">

<h3>Frame Style</h3>
<select id="frame">
<option value="black">Black</option>
<option value="gold">Gold</option>
<option value="wood">Wood</option>
<option value="brown">Brown</option>
</select>

<h3>Size</h3>
<select id="size">
<option value="600">Small (₹600)</option>
<option value="1000">Medium (₹1000)</option>
<option value="1600">Large (₹1600)</option>
</select>

<h3>Mount</h3>
<select id="mount">
<option value="0">Without Mount</option>
<option value="100">With Mount (+₹100)</option>
</select>

<h3>Delivery</h3>
<label><input type="checkbox" id="delivery"> Add Delivery (+₹100)</label>

<h2>Total: ₹<span id="price">600</span></h2>

<h3>Details</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="orderNow()">Order on WhatsApp</button>

</div>

</section>

<script src="script.js"></script>
</body>
</html>
