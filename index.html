<!DOCTYPE html>
<html>
<head>
<title>RK Photo Frame</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<img src="images/logo.png" class="logo">
<h2>RK Photo Frame</h2>
<p class="tagline">Premium Custom Framing</p>
</header>

<section class="container">

<!-- PREVIEW -->
<div class="preview-section">
<div class="wall">

<div class="frame-container">
<img id="userImage" class="photo">

<div id="mountLayer"></div>
<div id="frameLayer" class="frame-black"></div>
</div>

</div>
</div>

<!-- CONTROLS -->
<div class="controls">

<h3>Upload Your Photo</h3>
<input type="file" id="upload">

<h3>Select Frame</h3>
<div class="frames">
<img src="images/Goldpremium.jpg" onclick="selectFrame('goldpremium')">
<img src="images/black.jpg" onclick="selectFrame('black')">
<img src="images/brown.jpg" onclick="selectFrame('brown')">
<img src="images/browngold.jpg" onclick="selectFrame('browngold')">
<img src="images/goldcarving.jpg" onclick="selectFrame('goldcarving')">
<img src="images/goldvintage.jpg" onclick="selectFrame('goldvintage')">
<img src="images/wood.jpg" onclick="selectFrame('wood')">
</div>

<h3>Select Size</h3>
<select id="size">
<option value="600">Small (₹600)</option>
<option value="1000">Medium (₹1000)</option>
<option value="1600">Large (₹1600)</option>
</select>

<h3>Mount</h3>
<select id="mount">
<option value="0">Without Mount</option>
<option value="100">With Mount (+₹100)</option>
</select>

<h3>Delivery</h3>
<label><input type="checkbox" id="delivery"> Add Delivery (+₹100)</label>

<h2>Total Price: ₹<span id="price">600</span></h2>

<h3>Customer Details</h3>
<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Delivery Address"></textarea>

<button onclick="orderNow()">Order on WhatsApp</button>

</div>

</section>

<script src="script.js"></script>
</body>
</html>
