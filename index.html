<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RK Photo Frame</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>RK Photo Frame</h1>
<p style="text-align:center;">Premium Custom Framing</p>

  <h2>Upload Your Photo</h2>
  <input type="file" id="upload" accept="image/*">
  <br><br>
  <img id="preview" style="width:200px; display:none;">

  <h2>Customize Frame</h2>

<label>Frame:</label> <select id="frame"> <option value="500">Classic Black</option> <option value="700">Wood Brown</option> <option value="1000">Golden Frame</option> </select>

<label>Mount:</label> <select id="mount"> <option value="200">With Mount</option> <option value="0">Without Mount</option> </select>

<label>Paper:</label> <select id="paper"> <option value="100">Matte</option> <option value="150">Glossy</option> </select>

  <h3>Total Price: ₹<span id="price">0</span></h3>
<h2>Customer Details</h2>

<input type="text" id="name" placeholder="Your Name"><br><br> <input type="text" id="phone" placeholder="Phone Number"><br><br>

<textarea id="address" placeholder="Delivery Address"></textarea><br><br>

<button onclick="sendOrder()">Order on WhatsApp</button>


  <script src="script.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</body>
</html>
