<!DOCTYPE html>

<html>
<head>
  <title>RK Photo Frame</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="images/logo.png" class="logo">
  <div>
    RK Photo Frame
    <div class="tagline">Premium Custom Framing</div>
  </div>
</header>

<!-- HERO -->

<section class="hero">
  <h1>Turn Your Photos Into Beautiful Frames</h1>
  <p>Premium Custom Framing Delivered to Your Door</p>
</section>

<main>

<h2>Upload Your Photo</h2>
<input type="file" id="upload">

<!-- WALL PREVIEW -->

<div class="wall-preview">
  <div class="frame">
    <img id="preview" />
  </div>
</div>

<h2>Select Frame</h2>
<div class="frame-gallery">
  <img src="https://via.placeholder.com/100" onclick="selectFrame(this,300)">
  <img src="https://via.placeholder.com/100" onclick="selectFrame(this,400)">
  <img src="https://via.placeholder.com/100" onclick="selectFrame(this,500)">
</div>

<h2>Mount</h2>
<select id="mount">
  <option value="0">No Mount</option>
  <option value="200">With Mount (+₹200)</option>
</select>

<h2>Paper</h2>
<select id="paper">
  <option value="0">Normal</option>
  <option value="300">Premium (+₹300)</option>
</select>

<h2>Total Price: ₹<span id="price">300</span></h2>

<h2>Customer Details</h2>
<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Delivery Address"></textarea>

<button onclick="placeOrder()">Order on WhatsApp</button>

<p class="trust">
✔ 100% Quality Guarantee  
✔ Cash on Delivery Available  
✔ Trusted by Customers
</p>

</main>

<script src="script.js"></script>

</body>
</html>
